name: Sync fork with upstream

on:
  schedule:
    # 每天 03:20 UTC（北京时间 11:20）自动同步上游
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream/main into fork
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Merge upstream and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898994+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/tianma-if/edgeever.git
          git fetch upstream main
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream."
            exit 0
          fi
          git merge --no-edit upstream/main
          git push origin main
